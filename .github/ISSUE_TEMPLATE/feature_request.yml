name: Feature Request
description: Suggest a new feature for PlaidBar
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep examples public-safe. Do not include real Plaid credentials, access tokens, account numbers, transaction exports, or screenshots that reveal balances.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
