name: Bug Report
description: Report a bug in PlaidBar
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: input
    id: version
    attributes:
      label: PlaidBar Version
      placeholder: "0.1.0"

  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "15.0"
