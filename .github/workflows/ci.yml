name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Toolchain diagnostics
        run: |
          xcode-select -p
          xcrun --find swift
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c release

      - name: Strict concurrency build
        run: swift build -Xswiftc -strict-concurrency=complete

      - name: Test
        run: swift test

      - name: Sandbox smoke
        env:
          PLAID_CLIENT_ID: ci_smoke_client
          PLAID_SECRET: ci_smoke_secret
          PLAIDBAR_SMOKE_PORT: 18487
        run: ./Scripts/smoke-sandbox.sh
