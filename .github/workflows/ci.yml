name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Toolchain diagnostics
        run: |
          xcode-select -p
          xcrun --find swift
          swift --version

      - name: Packaging checks
        run: |
          bash -n Scripts/*.sh Scripts/vaultpeek-run Scripts/plaidbar-run

      - name: Secret scan
        run: PLAIDBAR_GATE_SKIP_BUILD=1 bash Scripts/pre-push-gate.sh

      - name: Version metadata alignment
        run: ./Scripts/verify-version-alignment.sh

      - name: Clear stale SwiftPM binary artifact cache
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts/https___github_com_sparkle_project_Sparkle_releases_download_2_9_3_Sparkle_for_Swift_Package_Manager_zip

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c release

      - name: Strict concurrency build
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Test
        # Opt in to the Keychain-backed token-safety tests. They are gated off
        # by default so local `swift test` never writes to a developer's login
        # keychain (which, under ad-hoc rebuild signatures, prompts repeatedly).
        # The CI runner has a fresh keychain and a stable per-run signature, so
        # the tests create and delete their own items in one process without a
        # prompt. See Tests/PlaidBarServerTests/KeychainTestSupport.swift.
        env:
          PLAIDBAR_TEST_KEYCHAIN: '1'
        run: swift test

      - name: Sandbox smoke
        env:
          PLAID_CLIENT_ID: ci_smoke_client
          PLAID_SECRET: ci_smoke_secret
          PLAIDBAR_SMOKE_PORT: 18487
        run: ./Scripts/smoke-sandbox.sh

      - name: App bundle package validation
        run: |
          ./Scripts/package-app.sh
          ./Scripts/validate-app-bundle.sh
